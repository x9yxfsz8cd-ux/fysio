<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fysio">
<title>Fysio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23000000'/%3E%3Crect x='2' y='13' width='4' height='6' rx='1.5' fill='%23ff6b35'/%3E%3Crect x='4' y='11' width='3' height='10' rx='1.5' fill='%23ff6b35'/%3E%3Crect x='26' y='13' width='4' height='6' rx='1.5' fill='%23ff6b35'/%3E%3Crect x='25' y='11' width='3' height='10' rx='1.5' fill='%23ff6b35'/%3E%3Crect x='7' y='14.5' width='18' height='3' rx='1.5' fill='%23ff6b35'/%3E%3C/svg%3E">
<style>
:root {
  color-scheme:  dark;
  --bg:          #000000;
  --surface:     rgba(255,255,255,0.05);
  --surface2:    rgba(255,255,255,0.08);
  --surface3:    rgba(255,255,255,0.12);
  --border:      rgba(255,255,255,0.08);
  --border2:     rgba(255,255,255,0.12);
  --accent:      #ff6b35;
  --accent-dim:  rgba(255,107,53,0.12);
  --accent-glow: rgba(255,107,53,0.4);
  --green:       #34d399;
  --green-dim:   rgba(52,211,153,0.1);
  --green-glow:  rgba(52,211,153,0.3);
  --red:         #f43f5e;
  --red-glow:    rgba(244,63,94,0.3);
  --orange:      #fbbf24;
  --text:        #ffffff;
  --text2:       rgba(255,255,255,0.6);
  --text3:       rgba(255,255,255,0.35);
  --sans:        -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  --mono:        'SF Mono', 'SFMono-Regular', Consolas, Menlo, monospace;
  --r:           8px;
  --r-lg:        12px;
  --r-xl:        16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--sans);
  background: var(--bg); color: var(--text);
  min-height: 100vh; -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

/* Screen transitions */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.screen.active { animation: fadeIn 0.25s ease-out; }

::-webkit-scrollbar { width: 0; }
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }


/* HOME */
.home-top {
  padding: 0 28px 0;
  padding-top: max(72px, calc(env(safe-area-inset-top) + 40px));
  padding-bottom: 20px;
}
.home-eyebrow {
  font-size: 11px; font-weight: 600; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--text3); margin-bottom: 8px;
  font-family: var(--mono);
}
.home-title {
  font-size: 28px; font-weight: 800; letter-spacing: -0.5px; line-height: 1;
}
.streak-pill {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 14px;
  font-size: 12px; font-weight: 600; color: var(--text3);
  font-family: var(--mono);
}
.streak-pill b { color: var(--orange); }

/* Session cards */
.home-list { padding: 24px 28px; display: flex; flex-direction: column; gap: 8px; }
.list-label {
  font-size: 13px; font-weight: 500; color: var(--text3);
  margin-bottom: 12px;
}

/* Picker */
.pick-trigger {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; font-family: var(--mono); transition: background 0.12s;
  color: var(--text2); font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
}
.pick-trigger:active { background: var(--surface2); }
.pick-trigger-left { display: flex; align-items: center; gap: 8px; }
.pick-item {
  background: var(--surface); border: 1px solid var(--border);
  border-left: 2px solid var(--border2);
  border-radius: var(--r); padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; width: 100%; text-align: left; font-family: var(--mono);
  transition: background 0.12s;
}
.pick-item:active { background: var(--surface2); }
.pick-item.selected { border-left-color: var(--accent); background: var(--accent-dim); }
.pick-check { width: 20px; height: 20px; border-radius: 3px; border: 2px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
.pick-item.selected .pick-check { background: var(--accent); border-color: var(--accent); color: #fff; }
.pick-item-name { font-size: 13px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
.pick-item-sub { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
.pick-item-right { color: var(--text3); flex-shrink: 0; }
.pick-gear { color: var(--text3); }
.pick-gear-free { color: var(--green); }
.pick-filter-btn {
  padding: 10px 16px; border-radius: var(--r); font-family: var(--mono);
  font-size: 12px; font-weight: 700; cursor: pointer;
  background: var(--surface); border: 1px solid var(--border); color: var(--text3);
  transition: all 0.12s;
}
.pick-filter-btn.active { background: var(--accent-dim); border-color: rgba(255,107,53,0.3); color: var(--accent); }
.gear-tag { font-size: 9px; padding: 2px 6px; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
.gear-tag-free { background: var(--green-dim); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
.gear-tag-need { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }


/* History */
.home-history { padding: 24px 28px 48px; padding-bottom: max(48px, calc(env(safe-area-inset-bottom) + 24px)); }
.hist-empty { font-size: 13px; color: var(--text3); padding: 4px 0; }
.hist-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.hist-item:last-child { border-bottom: none; }
.hist-dot  { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.hist-label { flex: 1; color: var(--text2); }
.hist-date  { font-size: 12px; color: var(--text3); font-family: var(--mono); }

/* WORKOUT NAV */
.wk-nav {
  background: rgba(0,0,0,0.85);
  -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px; padding-top: max(16px, calc(env(safe-area-inset-top) + 8px));
  display: flex; align-items: center; gap: 8px;
  position: sticky; top: 0; z-index: 30;
}
.wk-back {
  display: inline-flex; align-items: center; gap: 4px;
  background: none; border: none; color: var(--accent);
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: var(--sans); padding: 4px 0; flex-shrink: 0;
}
.wk-nav-center { flex: 1; text-align: center; }
.wk-nav-title  { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--mono); }
.wk-nav-sub    { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
.wk-nav-spacer { width: 64px; }
.wk-hud {
  display: flex; justify-content: center; gap: 20px;
  padding: 0 24px 12px; font-family: var(--mono); font-size: 11px; color: var(--text3);
}
.wk-hud-item { display: flex; align-items: center; gap: 4px; }
.wk-hud-val { color: var(--text2); font-weight: 600; }

/* Segmented progress */
.seg-track {
  display: flex; gap: 3px; padding: 0 24px 16px;
  background: transparent;
}
.seg { flex: 1; height: 3px; border-radius: 2px; background: var(--border2); transition: background 0.4s ease; }
.seg.done   { background: var(--accent); }
.seg.active { background: var(--accent); opacity: 0.4; }

/* Workout body */
.wk-body { flex: 1; padding: 20px 24px 40px; padding-bottom: max(40px, calc(env(safe-area-inset-bottom) + 20px)); display: flex; flex-direction: column; gap: 12px; }

/* Exercise header */
.ex-card {
  background: none; border: none;
  padding: 8px 0 0;
}
.ex-eyebrow {
  font-size: 12px; font-weight: 600; color: var(--accent);
  margin-bottom: 8px; letter-spacing: 0.1em; text-transform: uppercase;
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono);
}
.ex-name { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.05; margin-bottom: 14px; color: var(--text); text-transform: uppercase; }



/* Workout actions */
.wk-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.ex-meta { font-size: 13px; color: var(--text3); font-family: var(--mono); margin-bottom: 4px; }

/* Buttons */
.btn-primary {
  width: 100%;
  background: #fff;
  color: #000; border: none;
  border-radius: 100px; padding: 18px;
  font-size: 16px; font-weight: 700; cursor: pointer; font-family: var(--sans);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  letter-spacing: -0.2px;
  transition: opacity 0.15s, transform 0.2s;
}
.btn-primary:active { opacity: 0.85; transform: scale(0.97); }
.btn-primary.finish {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 8px 32px var(--accent-glow);
}

.btn-ghost {
  width: 100%; background: none;
  border: 1px solid var(--border2);
  color: var(--text2); border-radius: 100px; padding: 14px;
  font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--sans);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: background 0.15s;
}
.btn-ghost:active { background: var(--surface); }
.btn-sm { width: auto; padding: 10px 20px; font-size: 13px; border-radius: 100px; min-width: 96px; }

/* REST TIMER */
.rest-view {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 24px 22px 28px;
}
.rest-eyebrow {
  font-size: 11px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 20px;
  display: flex; align-items: center; gap: 6px; font-family: var(--mono);
}
.rest-ring-wrap { position: relative; width: 180px; height: 180px; margin-bottom: 18px; }
.rest-ring-wrap svg { transform: rotate(-90deg); display: block; }
.ring-bg   { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 8; }
.ring-fill { fill: none; stroke: var(--accent); stroke-width: 8; stroke-linecap: round;
  transition: stroke-dashoffset 1s linear, stroke 2s ease, filter 2s ease;
}
.rest-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.rest-sec  { font-size: 72px; font-weight: 800; letter-spacing: -3px; line-height: 1; font-family: var(--mono); }
.rest-unit { font-size: 11px; font-weight: 600; color: var(--text3); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.12em; font-family: var(--mono); }

.rest-msg  { font-size: 16px; font-weight: 600; color: var(--text2); text-align: center; line-height: 1.5; margin-bottom: 8px; }
.rest-next { font-size: 13px; color: var(--text3); margin-bottom: 32px; display: flex; align-items: center; gap: 6px; font-family: var(--mono); }
.rest-btns { display: flex; flex-direction: column; gap: 6px; width: 100%; }
.rest-skip {
  width: 100%; background: #fff;
  color: #000; border: none;
  border-radius: 100px; padding: 18px; font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: var(--sans); display: flex; align-items: center;
  justify-content: center; gap: 8px;
  transition: opacity 0.15s, transform 0.2s;
}
.rest-skip:active { opacity: 0.85; transform: scale(0.97); }
.rest-add {
  width: 100%; background: none; border: none; color: var(--text3);
  padding: 12px; font-size: 14px; cursor: pointer; font-family: var(--sans);
  display: flex; align-items: center; justify-content: center; gap: 6px;
}

/* DONE */
#screen-done { align-items: center; justify-content: center; text-align: center; padding: 48px 28px; padding-bottom: max(48px, calc(env(safe-area-inset-bottom) + 24px)); }
.done-icon {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--green-dim); border: 1px solid rgba(52,211,153,0.2);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 28px; color: var(--green);
  box-shadow: 0 0 40px var(--green-glow);
}
.done-title { font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
.done-sub   { font-size: 16px; color: var(--text3); line-height: 1.6; margin-bottom: 32px; font-weight: 400; }
.done-stats { display: flex; gap: 8px; margin-bottom: 28px; width: 100%; max-width: 340px; }
.done-stat  {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 18px 12px; text-align: center;
}
.done-stat-n { font-size: 32px; font-weight: 800; letter-spacing: -1px; font-family: var(--mono); color: var(--accent); }
.done-stat-l { font-size: 11px; color: var(--text3); margin-top: 6px; font-weight: 600; font-family: var(--mono); }
.done-home-btn {
  width: 100%; max-width: 340px;
  background: none; border: 1px solid var(--border2);
  border-radius: 100px; color: var(--text2); padding: 18px;
  font-size: 15px; font-weight: 500; cursor: pointer; font-family: var(--sans);
  transition: background 0.15s, transform 0.2s;
}
.done-home-btn:active { background: var(--surface); transform: scale(0.97); }

/* iPad / desktop: center and constrain width */
@media (min-width: 600px) {
  body { display: flex; justify-content: center; }
  .screen { max-width: 480px; width: 100%; }
}


/* Exercise timer card */
.ex-timer-card {
  background: none; border: none;
  padding: 20px 0 8px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer;
}
.ex-timer-eyebrow { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; font-family: var(--mono); }
.ex-timer-ring-wrap { position: relative; width: 180px; height: 180px; }
.ex-timer-ring-wrap svg { transform: rotate(-90deg); display: block; }
.ex-timer-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ex-timer-sec { font-size: 64px; font-weight: 800; letter-spacing: -3px; line-height: 1; font-family: var(--mono); }
.ex-timer-unit { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; margin-top: 6px; font-family: var(--mono); }
@keyframes pulse-green {
  0%,100% { box-shadow: 0 0 0 0 rgba(52,211,153,0.5); }
  50%     { box-shadow: 0 0 0 8px rgba(52,211,153,0); }
}
.btn-primary.pulse { animation: pulse-green 0.8s ease-in-out infinite; }

/* Breathing indicator */
.adem-bar {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 16px;
  background: rgba(52,211,153,0.06); border: 1px solid rgba(52,211,153,0.12);
  border-radius: var(--r); font-size: 13px; color: var(--green);
  font-family: var(--mono);
}
.adem-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--green);
  animation: ademPulse 3s ease-in-out infinite;
}
@keyframes ademPulse { 0%,100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

/* Timer states */
.ring-fill.urgent { stroke: var(--red); }

/* Confetti canvas */
#confetti-canvas { position: fixed; inset: 0; z-index: 100; pointer-events: none; }

/* Session preview */
.preview-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 20px; animation: fadeIn 0.2s ease-out;
}
.preview-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
}
.preview-title { font-size: 15px; font-weight: 700; }
.preview-shuffle {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--r); padding: 6px 12px;
  font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--sans);
  color: var(--accent); display: flex; align-items: center; gap: 5px;
  transition: opacity 0.15s;
}
.preview-shuffle:active { opacity: 0.7; }
.preview-list {
  display: flex; flex-direction: column; gap: 2px;
  background: var(--surface2); border-radius: var(--r); overflow: hidden;
  margin-bottom: 4px;
}
.preview-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px; font-size: 13px;
}
.preview-name { font-weight: 600; }
.preview-meta { font-size: 12px; color: var(--text3); font-family: var(--mono); }
.preview-action { margin-top: 12px; }
.preview-action-secondary { margin-top: 6px; }

/* Quick start */
.quick-section { padding: 0 28px 8px; }
.quick-card {
  background: var(--accent);
  border: none;
  border-radius: var(--r); padding: 16px 20px;
  cursor: pointer; width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity 0.15s, transform 0.2s;
}
.quick-card:active { opacity: 0.9; transform: scale(0.98); }
.quick-icon { display: none; }
.quick-body { text-align: center; }
.quick-title { font-size: 14px; font-weight: 700; color: #fff; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; }
.quick-sub { font-size: 11px; color: rgba(255,255,255,0.6); font-family: var(--mono); margin-top: 2px; }
.quick-chev { display: none; }

/* Session buttons */
.day-nrg-btn {
  width: 100%; padding: 16px 14px;
  border-radius: 100px; font-family: var(--sans);
  font-size: 14px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: opacity 0.15s, transform 0.2s;
}
.day-nrg-btn:active { opacity: 0.8; transform: scale(0.97); }
.day-nrg-low  { background: var(--surface); border: 1px solid var(--border); color: var(--text3); }
.day-nrg-mid  { background: var(--surface); border: 1px solid var(--border2); color: var(--text2); }
.day-nrg-high { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); }

/* Featured session button */
.session-featured {
  width: 100%; padding: 20px 24px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--r-xl); cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  color: var(--text); font-family: var(--sans);
  transition: opacity 0.15s, transform 0.2s;
}
.session-featured:active { opacity: 0.8; transform: scale(0.98); }
.session-featured-left { text-align: left; }
.session-featured-title { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.session-featured-sub { font-size: 13px; color: var(--text3); }

/* Layout utilities */
.home-section { padding: 0 28px 16px; }
.session-grid { display: flex; flex-direction: column; gap: 6px; }
.session-row  { display: flex; gap: 4px; }
.session-row > button { flex: 1; }
.list-label--flush { margin-top: 8px; margin-bottom: 0; }
.pick-body { flex: 1; }
#session-preview { display: none; padding: 0 24px 16px; }
#pick-filter { padding: 8px 24px 0; display: flex; gap: 6px; }
#pick-list { padding: 12px 24px 16px; display: flex; flex-direction: column; gap: 6px; }
#pick-start-bar {
  display: none; position: sticky; bottom: 0;
  padding: 12px 24px; padding-bottom: max(24px, calc(env(safe-area-inset-bottom) + 12px));
  background: linear-gradient(transparent, var(--bg) 20%);
}

/* Exercise steps overlay (shown on pause) */
.steps-overlay {
  display: none; padding: 16px 0;
  animation: fadeIn 0.25s ease-out;
}
.steps-overlay.visible { display: block; }
.step-item {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 12px 0;
}
.step-num {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  background: var(--accent-dim); border: 1px solid rgba(255,107,53,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: var(--accent); font-family: var(--mono);
}
.step-text { font-size: 15px; color: var(--text2); line-height: 1.5; padding-top: 3px; }
.timer-tap-hint {
  font-size: 11px; color: var(--text3); text-align: center;
  margin-top: 4px; font-family: var(--mono);
  opacity: 0.6;
}

/* Superset transition */
.superset-banner {
  text-align: center; padding: 12px 20px;
  background: var(--accent-dim); border: 1px solid rgba(255,107,53,0.15);
  border-radius: var(--r-lg); margin-bottom: 8px;
  font-size: 14px; font-weight: 600; color: var(--accent);
  animation: fadeIn 0.3s ease-out;
}

/* Session overview */
.overview-card {
  background: var(--surface); border-radius: var(--r-xl);
  padding: 24px; margin-bottom: 12px;
}
.overview-title { font-size: 20px; font-weight: 800; margin-bottom: 16px; letter-spacing: -0.5px; }
.overview-meta { display: flex; gap: 16px; margin-bottom: 20px; }

.overview-meta-item { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
.overview-pair {
  display: flex; gap: 8px; padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.overview-pair:last-child { border-bottom: none; }
.overview-pair-label { color: var(--accent); font-weight: 700; font-family: var(--mono); width: 28px; flex-shrink: 0; }
.overview-pair-name { flex: 1; color: var(--text2); }
.overview-pair-reps { color: var(--text3); font-family: var(--mono); font-size: 12px; }

/* Swipe hint */
.swipe-hint {
  text-align: center; padding: 8px;
  font-size: 11px; color: var(--text3); font-family: var(--mono);
  opacity: 0.5;
}

/* Focus states (accessibility) */
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.btn-primary:focus-visible { outline-color: var(--green); }
.pick-item:focus-visible { outline-offset: -2px; }
</style>

<script>
const PATHS={

  'chevron-left': `<polyline points="15 18 9 12 15 6"/>`,
  'arrow-right':  `<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>`,

  'flame':        `<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 3z"/>`,
  'dumbbell':     `<path d="M6 5v14M18 5v14M3 9h6M15 9h6M3 15h6M15 15h6"/>`,
  'link2':        `<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>`,
  'circle':       `<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>`,
  'play':         `<polygon points="5 3 19 12 5 21 5 3"/>`,
  'pause':        `<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>`,
  'info':         `<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>`,
  'bag':          `<path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>`,
  'skip':         `<polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>`,
  'plus':         `<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>`,
  'activity':     `<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>`,
  'zap':          `<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>`,
};
function ic(n,s=16){ return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${PATHS[n]||''}</svg>`; }

const EXERCISES=[
  {naam:'Jefferson Curl',sets:2,reps:'6–8',  super:'1A',type:'vimeo',vid:'236884896',notitie:'',gear:'Dumbbell',adem:'Uit bij afrollen, in bij oprollen',
    steps:['Sta rechtop met gewicht, voeten heupbreedte','Rol wervelkolom langzaam naar beneden, wervel voor wervel','Ga zo ver als comfortabel, rol langzaam terug omhoog'],
    cues:['Rol je wervelkolom op wervel voor wervel — begin bij het hoofd','Houd de knieën licht gebogen gedurende de hele beweging','Houd het gewicht dicht bij je lichaam']},
  {naam:'Side Bends',    sets:2,reps:'8',    super:'1B',type:'yt',vid:'mjRUPpMh988',notitie:'',gear:'Dumbbell',adem:'Uit bij buigen, in bij terugkomen',
    steps:['Sta rechtop, gewicht in één hand langs je zij','Buig zijwaarts weg van het gewicht','Kom gecontroleerd terug naar rechtop'],
    cues:['Beweeg recht naar opzij — niet naar voren of achteren','Houd beide heupen op dezelfde hoogte','Voel de rek aan de zijkant van je romp']},
  {naam:'Goblet Squat',  sets:3,reps:'10–12',super:'2A',type:'vimeo',vid:'169669956',notitie:'12 kg',gear:'Kettlebell',adem:'In bij zakken, uit bij opstaan',
    steps:['Houd kettlebell tegen je borst, voeten schouderbreedte','Zak naar beneden alsof je gaat zitten, knieën naar buiten','Duw door je hielen terug omhoog'],
    cues:['Houd de kettlebell dicht tegen je borst','Knieën wijzen in de richting van je tenen','Hak blijft volledig op de grond tijdens de beweging']},
  {naam:'Floor Press',   sets:3,reps:'8–10', super:'2B',type:'yt',vid:'NubSSALIqsU',notitie:'7 kg',gear:'Dumbbell',adem:'Uit bij omhoog duwen, in bij zakken',
    steps:['Lig op je rug, knieën gebogen, dumbbells boven borst','Laat gewichten zakken tot ellebogen de grond raken','Duw krachtig omhoog tot armen gestrekt'],
    cues:['Houd je onderrug plat op de grond','Ellebogen licht naar binnen tijdens de beweging','Gecontroleerd zakken, krachtig omhoog duwen']},
  {naam:'Pallof Press',  sets:3,reps:'10',   super:'3A',type:'yt',vid:'Y0e2w0aKOXw',notitie:'',gear:'Band',adem:'Uit bij uitstrekken, in bij terugtrekken',
    steps:['Sta zijwaarts van de band, handen bij je borst','Strek armen naar voren — houd je romp stabiel','Trek langzaam terug naar je borst'],
    cues:['Houd je kern actief en je rug recht','Strek de armen langzaam en gecontroleerd uit','Laat je romp niet mee draaien bij het uitstrekken']},
  {naam:'Face Pull',     sets:3,reps:'10–12',super:'3B',type:'yt',vid:'0GRycI5CXnM',notitie:'',gear:'Band',adem:'Uit bij trekken, in bij loslaten',
    steps:['Pak de band met beide handen, armen gestrekt','Trek naar je voorhoofd, ellebogen wijd','Knijp schouderbladen samen, laat langzaam terug'],
    cues:['Trek naar je voorhoofd — ellebogen omhoog','Schouderbladen naar elkaar toe in de eindpositie','Langzame, gecontroleerde beweging terug']},
  {naam:'Bruggetjes',    sets:3,reps:'12–15',super:'4A',type:'text',notitie:'',gear:'',adem:'Uit bij optillen, in bij zakken',
    steps:['Lig op je rug, knieën gebogen, voeten plat op de grond','Duw heupen omhoog tot rechte lijn knieën-schouders','Houd even vast, laat langzaam zakken'],
    desc:'Lig op je rug met gebogen knieën, voeten op de grond. Duw je heupen omhoog tot een rechte lijn van knieën tot schouders. Houd even vast en laat langzaam zakken.',cues:['Duw via je hielen omhoog — niet via je tenen','Span je bilspieren actief aan in de bovenste positie','Houd je bekken horizontaal — niet scheef laten zakken']},
  {naam:'Deadbug',       sets:3,reps:'12',   super:'4B',type:'yt',vid:'4XLEnwUr1d8',notitie:'',gear:'',adem:'Uit bij strekken, in bij terugbrengen',
    steps:['Lig op je rug, armen omhoog, knieën op 90°','Strek tegenovergestelde arm en been uit','Breng langzaam terug, wissel van kant'],
    cues:['Onderrug blijft plat op de grond — geen ruimte','Strek tegenovergestelde arm en been tegelijk','Beweeg langzaam en gecontroleerd']},
];
const P={1:EXERCISES};

const SPR={
  'Jefferson Curl':5,'Goblet Squat':3,'Pallof Press':3,'Face Pull':3,
  'Side Bends':3,'Floor Press':3,'Bruggetjes':3,'Deadbug':3,
};
const ALTIJD_PER_KANT=['Side Bends'];
function calcSetDur(o){
  const parts=o.reps.split(/[–\-]/);
  const avg=parts.length===2?(parseInt(parts[0])+parseInt(parts[1]))/2:parseInt(parts[0]);
  const perKant=ALTIJD_PER_KANT.includes(o.naam)||o.notitie.toLowerCase().includes('kant');
  return Math.round(avg*(SPR[o.naam]||3)*(perKant?2:1));
}
function calcExsDuration(exs){
  const work=exs.reduce((s,o)=>s+o.sets*calcSetDur(o),0);
  const hasSuper=exs.some(o=>o.super);
  let rests;
  if(hasSuper&&exs.length>1){
    const order=buildCircuitOrder(exs);
    rests=0;
    for(let i=0;i<order.length-1;i++){
      const a=exs[order[i].ex],b=exs[order[i+1].ex];
      if(!a.super||!b.super||a.super.replace(/[AB]/,'')!==b.super.replace(/[AB]/,'')) rests++;
    }
  } else {
    rests=Math.max(0,exs.reduce((s,o)=>s+o.sets,0)-1);
  }
  return Math.round((work+rests*REST_SECS)/60);
}
let st={day:null,ex:0,set:0,history:[],exercises:[],mode:null,circuit:false,circuitOrder:[],step:0,supersetTransition:false};
let nextExPending=false,restInterval=null,setTimerInterval=null;

function buildCircuitOrder(exs){
  // Group by superset number, maintaining A/B order
  const groups={};
  exs.forEach((o,i)=>{
    const g=o.super?o.super.replace(/[AB]/,''):String(i);
    if(!groups[g])groups[g]=[];
    groups[g].push(i);
  });
  const groupKeys=Object.keys(groups);
  const maxSets=Math.max(...exs.map(o=>o.sets));
  const order=[];
  for(let r=0;r<maxSets;r++){
    for(const g of groupKeys){
      for(const e of groups[g]){
        if(r<exs[e].sets) order.push({ex:e,set:r});
      }
    }
  }
  return order;
}
function initCircuit(){
  if(!st.circuit||st.exercises.length<2)return;
  st.circuitOrder=buildCircuitOrder(st.exercises);
  st.step=0;st.ex=st.circuitOrder[0].ex;st.set=st.circuitOrder[0].set;
}
function advanceCircuit(){
  st.step++;
  if(st.step>=st.circuitOrder.length)return false;
  st.ex=st.circuitOrder[st.step].ex;st.set=st.circuitOrder[st.step].set;
  return true;
}
const REST_SECS=50;
function getCoachMsg(){
  if(!st.circuit) return 'Goed gedaan. Even bijkomen.';
  const pct=st.step/st.circuitOrder.length;
  const remaining=st.circuitOrder.length-st.step;
  if(pct<0.2) return 'Goede start. Houd dit tempo vast.';
  if(pct<0.4) return `Lekker bezig — nog ${remaining} sets te gaan.`;
  if(pct<0.6) return 'Halverwege! Sterke sessie tot nu toe.';
  if(pct<0.8) return `Laatste stuk — nog ${remaining} sets. Je kan dit.`;
  return 'Bijna klaar! Geef alles in de laatste sets.';
}

function load(){
  try{const d=localStorage.getItem('fysio-v6');if(d)st.history=JSON.parse(d);}catch(e){}
  renderHome();
  const params=new URLSearchParams(window.location.search);
  if(params.get('mode')==='quick') startQuick();
}
function save(){ try{localStorage.setItem('fysio-v6',JSON.stringify(st.history));}catch(e){} }
function today(){ return new Date().toISOString().split('T')[0]; }
function fmtDate(d){ return new Date(d+'T12:00:00').toLocaleDateString('nl-NL',{weekday:'short',day:'numeric',month:'short'}); }
function getStreak(){ const days=new Set(st.history.map(h=>h.datum));let s=0,d=new Date();while(true){const k=d.toISOString().split('T')[0];if(days.has(k)){s++;d.setDate(d.getDate()-1);}else break;}return s; }
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');window.scrollTo(0,0); }

function renderHome(){
  document.getElementById('home-eyebrow').innerHTML=ic('activity',12)+' Herstelschema';
  const streak=getStreak();
  document.getElementById('streak-pill').innerHTML=ic('flame',13)+` <span><b>${streak}</b> dag${streak!==1?'en':''} op rij</span>`;

  // Quick card
  const qp=getQuickPick();
  document.getElementById('quick-card').innerHTML=`
    <div class="quick-body">
      <div class="quick-title">Start een oefening</div>
      <div class="quick-sub">${qp.naam}</div>
    </div>`;

  const fullDur=calcExsDuration(EXERCISES);
  document.getElementById('session-btns').innerHTML=`
    <div class="session-grid">
      <button class="session-featured" onclick="startFullProgram()">
        <div class="session-featured-left">
          <div class="session-featured-title">${ic('activity',14)} Volledige training</div>
          <div class="session-featured-sub">4 supersets · ~${fullDur} min</div>
        </div>
        ${ic('chevron-right',16)}
      </button>
      <div class="session-row">
        <button class="day-nrg-btn day-nrg-low" onclick="buildSession(5,false)">5 min</button>
        <button class="day-nrg-btn day-nrg-mid" onclick="buildSession(15,false)">15 min</button>
        <button class="day-nrg-btn day-nrg-high" onclick="buildSession(25,false)">25 min</button>
      </div>
      <div class="list-label list-label--flush">Zonder spullen</div>
      <div class="session-row">
        <button class="day-nrg-btn day-nrg-low" onclick="buildSession(5,true)">${ic('zap',10)} 5 min</button>
        <button class="day-nrg-btn day-nrg-mid" onclick="buildSession(10,true)">${ic('zap',10)} 10 min</button>
        <button class="day-nrg-btn day-nrg-mid" onclick="buildSession(15,true)">${ic('zap',10)} 15 min</button>
      </div>
    </div>`;

  const recent=[...st.history].reverse().slice(0,7);
  document.getElementById('history-list').innerHTML=recent.length===0
    ?`<div class="hist-empty">Nog geen sessies — start je eerste training</div>`
    :recent.map(h=>{
      const label=h.count?`${h.count} oefening${h.count>1?'en':''} gedaan`:h.dag?`Dag ${h.dag} voltooid`:'Sessie voltooid';
      return `<div class="hist-item"><div class="hist-dot"></div><div class="hist-label">${label}</div><div class="hist-date">${fmtDate(h.datum)}</div></div>`;
    }).join('');
}

function triggerWatchWorkout(){
  if(!/iPhone/.test(navigator.userAgent)) return;
  try{ window.location.href='shortcuts://run-shortcut?name=Start%20core%20work-out'; }catch(e){}
}
let setTimerPaused=false;
let setTimerSecs=0;
let setTimerDur=0;
function startSetTimer(dur){
  clearInterval(setTimerInterval);  setTimerPaused=false;
  setTimerDur=dur;
  setTimerSecs=dur;
  const circ=2*Math.PI*78;
  const ring=document.getElementById('ex-ring'),label=document.getElementById('ex-timer-sec');
  if(!label)return;
  if(ring){ring.style.strokeDasharray=circ;ring.style.strokeDashoffset=0;ring.classList.remove('urgent');}
  label.textContent=dur;
  setTimerInterval=setInterval(()=>{
    if(setTimerPaused)return;
    setTimerSecs--;
    const r=document.getElementById('ex-ring'),l=document.getElementById('ex-timer-sec');
    if(!l){clearInterval(setTimerInterval);return;}
    const pct=Math.max(0,setTimerSecs/setTimerDur);
    if(r){
      r.style.strokeDashoffset=circ*(1-pct);
      if(setTimerSecs<=10) r.classList.add('urgent');
    }
    l.textContent=setTimerSecs>0?setTimerSecs:'—';
    if(setTimerSecs<=0){clearInterval(setTimerInterval);playBeep();const btn=document.querySelector('#wk-body .btn-primary');if(btn){btn.classList.add('pulse');btn.scrollIntoView({behavior:'smooth',block:'center'});}}
  },1000);
}
function togglePauseTimer(){
  setTimerPaused=!setTimerPaused;
  const overlay=document.getElementById('steps-overlay');
  const hint=document.getElementById('tap-hint');
  if(overlay) overlay.classList.toggle('visible',setTimerPaused);
  if(hint) hint.textContent=setTimerPaused?'tik om te hervatten':'tik om te pauzeren';
}
function getQuickPick(){
  const dayOfYear=Math.floor((Date.now()-new Date(new Date().getFullYear(),0,0))/86400000);
  return EXERCISES[dayOfYear%EXERCISES.length];
}
function startQuick(){
  const ex=getQuickPick();
  st.day=null;st.exercises=[ex];st.mode='single';st.circuit=false;
  st.ex=0;st.set=0;requestWakeLock();startSessionTimer();renderWorkout();show('workout');
}
function startFullProgram(){
  st.day=null;st.exercises=[...EXERCISES];st.mode='full';st.circuit=true;
  st.ex=0;st.set=0;initCircuit();
  showSessionOverview();
}
function showSessionOverview(){
  const exs=st.exercises;
  const dur=calcExsDuration(exs);
  const gears=[...new Set(exs.map(o=>o.gear).filter(Boolean))];
  const pairs={};
  exs.forEach(o=>{if(o.super){const g=o.super.replace(/[AB]/,'');if(!pairs[g])pairs[g]=[];pairs[g].push(o);}});
  document.getElementById('wk-title').textContent='Training';
  document.getElementById('wk-sub').textContent=`${exs.length} oefeningen · ~${dur} min`;
  document.getElementById('wk-back-btn').innerHTML=ic('chevron-left',16)+' Terug';
  swipeEnabled=false;
  document.getElementById('seg-track').innerHTML='';
  document.getElementById('wk-hud').innerHTML='';
  document.getElementById('wk-body').innerHTML=`
    <div class="overview-card">
      <div class="overview-title">Je sessie</div>
      <div class="overview-meta">
        <div class="overview-meta-item">${ic('clock',14)} ~${dur} min</div>
        <div class="overview-meta-item">${ic('activity',14)} ${exs.length} oefeningen</div>
      </div>
      ${gears.length?`<div class="overview-meta overview-meta--gear"><div class="overview-meta-item">${ic('bag',14)} ${gears.join(' · ')}</div></div>`:''}
      ${Object.keys(pairs).map(g=>{
        const p=pairs[g];
        return p.map(o=>`<div class="overview-pair">
          <div class="overview-pair-label">${o.super}</div>
          <div class="overview-pair-name">${o.naam}</div>
          <div class="overview-pair-reps">${o.sets}×${o.reps}</div>
        </div>`).join('');
      }).join('')}
    </div>
    <button class="btn-primary" onclick="beginWorkout()">${ic('zap',15)} Start training</button>`;
  show('workout');
}
function beginWorkout(){
  requestWakeLock();
  startSessionTimer();
  renderWorkout();
  setTimeout(triggerWatchWorkout,300);
}
function togglePick(naam,el){
  if(pickSelected.has(naam)){pickSelected.delete(naam);el.classList.remove('selected');el.querySelector('.pick-check').innerHTML='';}
  else{pickSelected.add(naam);el.classList.add('selected');el.querySelector('.pick-check').innerHTML=ic('check',12);}
  updatePickBar();
}
function updatePickBar(){
  const bar=document.getElementById('pick-start-bar'),btn=document.getElementById('pick-start-btn');
  if(!bar)return;
  const n=pickSelected.size;
  if(n===0){bar.style.display='none';return;}
  bar.style.display='block';
  const exs=getExsByNames([...pickSelected]);
  const dur=calcExsDuration(exs);
  btn.innerHTML=`${ic('check',15)} Start ${n} oefening${n>1?'en':''} · ~${dur} min`;
}
function getExsByNames(names){
  return EXERCISES.filter(o=>names.includes(o.naam));
}
function startCustom(){
  const exs=getExsByNames([...pickSelected]);
  if(exs.length===0)return;
  st.day=null;st.exercises=exs;st.mode=exs.length===1?'single':'short';
  st.circuit=exs.length>1;
  // Behoud superset volgorde: sorteer op super label zodat A voor B komt
  if(st.circuit) exs.sort((a,b)=>(a.super||'').localeCompare(b.super||''));
  st.ex=0;st.set=0;initCircuit();
  requestWakeLock();startSessionTimer();renderWorkout();show('workout');
}
function startSingle(naam){
  const o=EXERCISES.find(x=>x.naam===naam);
  if(o){st.day=null;st.exercises=[o];st.mode='single';st.circuit=false;st.ex=0;st.set=0;requestWakeLock();startSessionTimer();renderWorkout();show('workout');}
}
let pickSelected=new Set();
function showPicker(filter){
  cancelPreview();
  pickSelected.clear();
  updatePickBar();
  const filtered=filter==='no-gear'?EXERCISES.filter(o=>!o.gear):EXERCISES;
  document.getElementById('pick-filter').innerHTML=`
    <button class="pick-filter-btn${!filter?' active':''}" onclick="showPicker()">Alles</button>
    <button class="pick-filter-btn${filter==='no-gear'?' active':''}" onclick="showPicker('no-gear')">Zonder spullen</button>`;
  document.getElementById('pick-list').innerHTML=filtered.map(o=>{
    const pk=ALTIJD_PER_KANT.includes(o.naam)||o.notitie.toLowerCase().includes('kant')||o.notitie.toLowerCase().includes('been');
    const gearLabel=o.gear?o.gear:'Geen spullen';
    const gearClass=o.gear?'pick-gear':'pick-gear pick-gear-free';
    const esc=o.naam.replace(/'/g,"\\'");
    return `<button class="pick-item" data-naam="${o.naam}" onclick="togglePick('${esc}',this)">
      <div class="pick-check"></div>
      <div class="pick-body"><div class="pick-item-name">${o.naam}</div><div class="pick-item-sub">${o.sets}×${o.reps}${pk?' · per kant':''} · <span class="${gearClass}">${gearLabel}</span></div></div>
    </button>`;
  }).join('');
  show('pick');
}
let pendingSession=null;
function pickSessionExercises(minutes,noGear){
  const pool=noGear?EXERCISES.filter(o=>!o.gear):[...EXERCISES];
  const shuffled=[...pool].sort(()=>Math.random()-0.5);
  const target=minutes*60;let total=0;const result=[];
  for(const o of shuffled){
    const exDur=o.sets*calcSetDur(o)+(o.sets-1)*REST_SECS;
    if(result.length>=1&&total+exDur>target) break;
    total+=exDur+(result.length>0?REST_SECS:0);
    result.push(o);
  }
  return result;
}
function buildSession(minutes,noGear){
  const result=pickSessionExercises(minutes,noGear);
  if(result.length===0) return;
  pendingSession={exercises:result,minutes,noGear};
  showSessionPreview();
}
function showSessionPreview(){
  const s=pendingSession;if(!s)return;
  const dur=calcExsDuration(s.exercises);
  const prev=document.getElementById('session-preview');
  prev.style.display='block';
  prev.innerHTML=`
    <div class="preview-card">
      <div class="preview-header">
        <span class="preview-title">${s.exercises.length} oefeningen · ~${dur} min</span>
        <button class="preview-shuffle" onclick="reshuffleSession()">${ic('activity',12)} Shuffle</button>
      </div>
      <div class="preview-list">${s.exercises.map(o=>{
        const pk=ALTIJD_PER_KANT.includes(o.naam);
        return `<div class="preview-item"><span class="preview-name">${o.naam}</span><span class="preview-meta">${o.sets}×${o.reps}${pk?' per kant':''}</span></div>`;
      }).join('')}</div>
      <button class="btn-primary preview-action" onclick="startPendingSession()">${ic('zap',15)} Start sessie</button>
      <button class="btn-ghost preview-action-secondary" onclick="cancelPreview()">Annuleer</button>
    </div>`;
  prev.scrollIntoView({behavior:'smooth'});
}
function reshuffleSession(){
  if(!pendingSession)return;
  pendingSession.exercises=pickSessionExercises(pendingSession.minutes,pendingSession.noGear);
  showSessionPreview();
}
function startPendingSession(){
  if(!pendingSession)return;
  const result=pendingSession.exercises;
  pendingSession=null;
  document.getElementById('session-preview').style.display='none';
  st.day=null;st.exercises=result;st.mode='short';st.circuit=result.length>1;
  st.ex=0;st.set=0;initCircuit();requestWakeLock();startSessionTimer();renderWorkout();show('workout');
  setTimeout(triggerWatchWorkout,300);
}
function cancelPreview(){
  pendingSession=null;
  document.getElementById('session-preview').style.display='none';
}
function goHome(){ clearInterval(restInterval);clearInterval(setTimerInterval);stopSessionTimer();releaseWakeLock();nextExPending=false;st.day=null;cancelPreview();renderHome();show('home'); }

function renderWorkout(){
  const oefs=st.exercises,o=oefs[st.ex],n=oefs.length;
  const perKant=ALTIJD_PER_KANT.includes(o.naam)||o.notitie.toLowerCase().includes('kant')||o.notitie.toLowerCase().includes('been');
  const isLast=st.circuit?st.step===st.circuitOrder.length-1:false;
  const isLastSet=st.circuit?isLast:(st.set===o.sets-1);
  const isLastEx=st.circuit?isLast:(st.ex===oefs.length-1);

  // Nav
  document.getElementById('wk-title').textContent=o.super||`${st.ex+1}/${n}`;
  document.getElementById('wk-sub').textContent=`SET ${st.set+1}/${o.sets}`;
  document.getElementById('wk-back-btn').innerHTML=ic('chevron-left',16)+' Terug';
  const tot=st.circuit?st.circuitOrder.length:n;
  const cur=st.circuit?st.step:st.ex;
  document.getElementById('seg-track').innerHTML=Array.from({length:tot},(_,i)=>`<div class="seg${i<cur?' done':i===cur?' active':''}"></div>`).join('');

  // Button label
  let btnLabel;
  if(isLastSet&&isLastEx) btnLabel='Training afronden';
  else if(st.circuit){
    const nextStep=st.circuitOrder[st.step+1];
    const nextEx=nextStep?oefs[nextStep.ex]:null;
    if(nextEx&&sameSuperset(o,nextEx)) btnLabel=`Klaar → ${nextEx.naam}`;
    else btnLabel='Klaar';
  } else if(isLastSet) btnLabel='Volgende oefening';
  else btnLabel=`Set ${st.set+1} gedaan`;

  // Timer
  const exCirc=(2*Math.PI*78).toFixed(1);
  const stepsHtml=o.steps?o.steps.map((s,i)=>`<div class="step-item"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></div>`).join(''):'';
  const meta=[o.sets+'×'+o.reps, perKant?'per kant':null, o.gear||'geen spullen'].filter(Boolean).join(' · ');

  // Superset banner
  const superBanner=st.supersetTransition?`<div class="superset-banner">${ic('zap',14)} Superset — direct door!</div>`:'';
  st.supersetTransition=false;

  document.getElementById('wk-body').innerHTML=`
    ${superBanner}
    <div class="ex-card">
      <div class="ex-eyebrow">${o.super?o.super+' · ':''}SET ${st.set+1}/${o.sets}</div>
      <div class="ex-name">${o.naam}</div>
      <div class="ex-meta">${meta}</div>
    </div>
    <div class="ex-timer-card" onclick="togglePauseTimer()" role="button" aria-label="Tik om te pauzeren">
      <div class="ex-timer-ring-wrap">
        <svg viewBox="0 0 180 180" width="180" height="180">
          <circle class="ring-bg" cx="90" cy="90" r="78"/>
          <circle class="ring-fill" cx="90" cy="90" r="78" id="ex-ring"
            stroke-dasharray="${exCirc}" stroke-dashoffset="0"/>
        </svg>
        <div class="ex-timer-center">
          <div class="ex-timer-sec" id="ex-timer-sec">${calcSetDur(o)}</div>
          <div class="ex-timer-unit">sec</div>
        </div>
      </div>
      <div class="timer-tap-hint" id="tap-hint">tik om te pauzeren</div>
    </div>
    ${o.adem?`<div class="adem-bar"><div class="adem-dot"></div>${o.adem}</div>`:''}
    <div class="steps-overlay" id="steps-overlay">${stepsHtml}</div>
    <div class="wk-actions">
      <button class="btn-primary${isLastSet&&isLastEx?' finish':''}" onclick="completeSet()">
        ${btnLabel}
      </button>
      <button class="btn-ghost" onclick="skipEx()">Overslaan</button>
    </div>`;
  startSetTimer(calcSetDur(o));
  swipeEnabled=true;
  updateHud();
}

function sameSuperset(a,b){
  if(!a.super||!b.super)return false;
  return a.super.replace(/[AB]/,'')=== b.super.replace(/[AB]/,'');
}
function completeSet(){
  clearInterval(setTimerInterval);  if(st.circuit){
    const prev=st.exercises[st.ex];
    if(!advanceCircuit()){finish();return;}
    const next=st.exercises[st.ex];
    if(sameSuperset(prev,next)){
      st.supersetTransition=true;
      renderWorkout();window.scrollTo(0,0);
    } else {
      st.supersetTransition=false;
      showRest('exercise');
    }
  } else {
    const oefs=st.exercises,o=oefs[st.ex];
    if(st.set<o.sets-1){st.set++;showRest('set');}
    else if(st.ex<oefs.length-1){nextExPending=true;showRest('exercise');}
    else finish();
  }
}
function skipEx(){
  clearInterval(setTimerInterval);nextExPending=false;clearInterval(restInterval);
  if(st.circuit){
    const skipIdx=st.ex;
    st.circuitOrder=st.circuitOrder.filter((s,i)=>i<=st.step||s.ex!==skipIdx);
    if(!advanceCircuit()){finish();return;}
  } else {
    st.ex++;st.set=0;if(st.ex>=st.exercises.length){finish();return;}
  }
  renderWorkout();window.scrollTo(0,0);
}

function showRest(type){
  swipeEnabled=false;
  clearInterval(setTimerInterval);
  clearInterval(restInterval);
  let secs=REST_SECS;
  const circ=2*Math.PI*80;
  const msg=getCoachMsg();
  let nextName=null;
  if(st.circuit&&st.step<st.circuitOrder.length) nextName=st.exercises[st.circuitOrder[st.step].ex].naam;
  else if(!st.circuit&&type==='exercise'&&st.ex+1<st.exercises.length) nextName=st.exercises[st.ex+1].naam;

  function draw(s){
    const offset=circ*(1-s/REST_SECS),urgent=s<=10;
    document.getElementById('wk-body').innerHTML=`
      <div class="rest-view">
        <div class="rest-eyebrow">${ic('clock',12)} Rust</div>
        <div class="rest-ring-wrap">
          <svg viewBox="0 0 180 180" width="180" height="180">
            <circle class="ring-bg"   cx="90" cy="90" r="80"/>
            <circle class="ring-fill${urgent?' urgent':''}" cx="90" cy="90" r="80"
              stroke-dasharray="${circ}" stroke-dashoffset="${offset}" id="rest-ring"/>
          </svg>
          <div class="rest-center">
            <div class="rest-sec" id="rest-num">${s}</div>
            <div class="rest-unit">sec</div>
          </div>
        </div>
        <div class="rest-msg">${msg}</div>
        ${nextName?`<div class="rest-next">${ic('arrow-right',12)} Volgende: ${nextName}</div>`:''}
        <div class="rest-btns">
          <button class="rest-skip" onclick="skipRest()">${ic('check',15)} Ik ben klaar</button>
          <button class="rest-add"  onclick="addRest()">${ic('plus',12)} 15 seconden extra rust</button>
        </div>
      </div>`;
  }
  draw(secs);
  restInterval=setInterval(()=>{
    secs--;
    const n=document.getElementById('rest-num'),r=document.getElementById('rest-ring');
    if(!n){clearInterval(restInterval);return;}
    n.textContent=secs;r.style.strokeDashoffset=circ*(1-secs/REST_SECS);
    if(secs<=10)r.classList.add('urgent');
    if(secs<=0){clearInterval(restInterval);playBeep();skipRest();}
  },1000);
}

function skipRest(){ clearInterval(restInterval);if(!st.circuit&&nextExPending){nextExPending=false;st.ex++;st.set=0;}renderWorkout();window.scrollTo(0,0); }
function addRest(){
  const n=document.getElementById('rest-num');if(!n)return;
  let secs=(parseInt(n.textContent)||0)+15;clearInterval(restInterval);
  const circ=2*Math.PI*80;
  const tick=()=>{const n=document.getElementById('rest-num'),r=document.getElementById('rest-ring');if(!n){clearInterval(restInterval);return;}n.textContent=secs;r.style.strokeDashoffset=circ*(1-Math.min(secs,REST_SECS)/REST_SECS);if(secs<=10)r.classList.add('urgent');if(secs<=0){clearInterval(restInterval);playBeep();skipRest();}secs--;};
  tick();restInterval=setInterval(tick,1000);
}
function playBeep(){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[0,.15,.3].forEach(t=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;o.type='sine';g.gain.setValueAtTime(.25,ctx.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.12);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.15);});}catch(e){}
  try{navigator.vibrate&&navigator.vibrate([100,50,100,50,200]);}catch(e){}
}

// Wake Lock — keep screen on during workout
let wakeLock=null;
async function requestWakeLock(){
  try{if('wakeLock' in navigator)wakeLock=await navigator.wakeLock.request('screen');}catch(e){}
}
function releaseWakeLock(){
  if(wakeLock){wakeLock.release();wakeLock=null;}
}

// Session elapsed timer
let sessionStartTime=null,sessionTimerInterval=null;
function startSessionTimer(){
  sessionStartTime=Date.now();
  sessionTimerInterval=setInterval(updateHud,1000);
  updateHud();
}
function stopSessionTimer(){clearInterval(sessionTimerInterval);sessionStartTime=null;}
function fmtTimer(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60);return `${m}:${String(s%60).padStart(2,'0')}`;}
function updateHud(){
  const hud=document.getElementById('wk-hud');if(!hud||!sessionStartTime)return;
  const elapsed=Date.now()-sessionStartTime;
  const totalDur=calcExsDuration(st.exercises)*60*1000;
  const remaining=Math.max(0,totalDur-elapsed);
  const pct=st.circuit?Math.round(st.step/(st.circuitOrder.length||1)*100):Math.round(st.set/(st.exercises[st.ex]?.sets||1)*100);
  hud.innerHTML=`
    <div class="wk-hud-item">ELAPSED <span class="wk-hud-val">${fmtTimer(elapsed)}</span></div>
    <div class="wk-hud-item">REMAINING <span class="wk-hud-val">~${fmtTimer(remaining)}</span></div>
    <div class="wk-hud-item">${pct}%</div>`;
}
function launchConfetti(){
  const c=document.getElementById('confetti-canvas');if(!c)return;
  c.width=window.innerWidth;c.height=window.innerHeight;
  const ctx=c.getContext('2d');
  const colors=['#ff6b35','#34d399','#fbbf24','#f43f5e','#ff8c5a','#67e8f9'];
  const particles=Array.from({length:60},()=>({
    x:Math.random()*c.width,y:Math.random()*-c.height*0.5,
    w:Math.random()*6+3,h:Math.random()*4+2,
    color:colors[Math.floor(Math.random()*colors.length)],
    vy:Math.random()*3+2,vx:(Math.random()-0.5)*2,
    rot:Math.random()*360,vr:Math.random()*8-4,
    opacity:1
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    let alive=false;
    particles.forEach(p=>{
      p.y+=p.vy;p.x+=p.vx;p.rot+=p.vr;
      if(frame>60)p.opacity=Math.max(0,p.opacity-0.015);
      if(p.opacity<=0)return;
      alive=true;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=p.opacity;ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
    });
    frame++;
    if(alive)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,c.width,c.height);
  }
  draw();
}
function finish(){
  const elapsed=sessionStartTime?Date.now()-sessionStartTime:0;
  stopSessionTimer();releaseWakeLock();
  const oefs=st.exercises;
  st.history.push({datum:today(),count:oefs.length});
  save();
  document.getElementById('ds-ex').textContent=oefs.length;
  document.getElementById('ds-sets').textContent=oefs.reduce((s,o)=>s+o.sets,0);
  document.getElementById('ds-streak').textContent=getStreak();
  const elapsedMin=Math.round(elapsed/60000);
  const msg=oefs.length===1?`${oefs[0].naam} gedaan in ${elapsedMin} min.`:`${oefs.length} oefeningen in ${elapsedMin} minuten.`;
  document.getElementById('done-p').textContent=msg;
  document.getElementById('wk-hud').innerHTML='';
  st.day=null;st.mode=null;show('done');
  setTimeout(launchConfetti,200);
}

// Swipe navigation (only during active exercise, not during rest/overview)
let swipeStartX=0,swipeStartY=0,swipeEnabled=false;
document.getElementById('screen-workout').addEventListener('touchstart',e=>{
  swipeStartX=e.touches[0].clientX;swipeStartY=e.touches[0].clientY;
},{passive:true});
document.getElementById('screen-workout').addEventListener('touchend',e=>{
  if(!swipeEnabled)return;
  const dx=swipeStartX-e.changedTouches[0].clientX;
  const dy=Math.abs(swipeStartY-e.changedTouches[0].clientY);
  if(dx>80&&dy<60) completeSet();
},{passive:true});

load();
</script>
