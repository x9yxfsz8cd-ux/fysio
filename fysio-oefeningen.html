<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fysio Oefeningen</title>
<style>
:root {
  color-scheme:  dark;
  --bg:          #0c0c0b;
  --surface:     #181817;
  --surface2:    #222220;
  --surface3:    #2c2c2a;
  --border:      #303030;
  --border2:     #404040;
  --accent:      #7b68ff;
  --accent-dim:  rgba(123,104,255,0.14);
  --accent-glow: rgba(123,104,255,0.3);
  --green:       #00e676;
  --green-dim:   rgba(0,230,118,0.1);
  --green-glow:  rgba(0,230,118,0.3);
  --red:         #ff3b30;
  --red-glow:    rgba(255,59,48,0.3);
  --orange:      #ffb800;
  --text:        #f5f2ee;
  --text2:       #b0aca4;
  --text3:       #6e6a64;
  --mono:        'SFMono-Regular', Consolas, Menlo, monospace;
  --r:           4px;
  --r-lg:        6px;
  --r-xl:        8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--mono);
  background: var(--bg); color: var(--text);
  min-height: 100vh; -webkit-font-smoothing: antialiased;
}

/* Subtle scanline texture */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 23px,
    rgba(255,255,255,0.013) 23px, rgba(255,255,255,0.013) 24px
  );
}

::-webkit-scrollbar { width: 0; }
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

.glass {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
}

/* HOME */
.home-top { padding: 52px 20px 20px; border-bottom: 1px solid var(--border); }

.home-eyebrow {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 12px;
}
.home-title {
  font-size: 26px; font-weight: 700; letter-spacing: -0.3px;
  line-height: 1.1; margin-bottom: 4px; font-family: var(--mono);
  text-transform: uppercase;
}
.home-sub { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.1em; }

.streak-pill {
  display: inline-flex; align-items: center; gap: 7px;
  background: rgba(255,184,0,0.08);
  border: 1px solid rgba(255,184,0,0.2);
  border-radius: 3px; padding: 5px 10px; margin-top: 14px;
  font-size: 11px; font-weight: 600; color: var(--orange);
  letter-spacing: 0.06em;
}
.streak-pill b { color: var(--orange); }

/* Day cards */
.home-list { padding: 16px 20px 0; display: flex; flex-direction: column; gap: 6px; }
.list-label {
  font-size: 10px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.14em;
  margin-bottom: 10px; padding: 0 2px;
}

.day-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  display: flex; align-items: flex-start; gap: 14px;
  padding: 16px; cursor: pointer; text-align: left; width: 100%;
  transition: background 0.12s, border-color 0.12s;
}
.day-card:active { background: var(--surface2); }
.day-card.done {
  background: rgba(0,230,118,0.04);
  border-color: rgba(0,230,118,0.14);
}

.day-badge {
  width: 38px; height: 38px; border-radius: var(--r); flex-shrink: 0;
  background: var(--accent-dim);
  border: 1px solid rgba(255,69,0,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--accent);
}
.day-card.done .day-badge {
  background: var(--green-dim);
  border-color: rgba(0,230,118,0.2);
  color: var(--green);
}

.day-body { flex: 1; min-width: 0; }
.day-title { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 4px; text-transform: uppercase; }
.day-sub   { font-size: 12px; color: var(--text2); line-height: 1.5; }
.day-tags  { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
.day-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 2px; padding: 2px 7px;
  font-size: 10px; color: var(--text2); white-space: nowrap;
  text-transform: uppercase; letter-spacing: 0.05em;
}
.day-chev { color: var(--text3); flex-shrink: 0; margin-top: 8px; }
.day-card.done .day-chev { color: var(--green); }


/* History */
.home-history { padding: 20px 20px 40px; }
.hist-empty { font-size: 10px; color: var(--text3); padding: 4px 2px; text-transform: uppercase; letter-spacing: 0.1em; }
.hist-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid var(--border);
  font-size: 11px;
}
.hist-item:last-child { border-bottom: none; }
.hist-dot  { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.hist-label { flex: 1; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
.hist-date  { font-size: 10px; color: var(--text3); }

/* WORKOUT NAV */
.wk-nav {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px; display: flex; align-items: center; gap: 8px;
  position: sticky; top: 0; z-index: 30;
}
.wk-back {
  display: inline-flex; align-items: center; gap: 3px;
  background: none; border: none; color: var(--accent);
  font-size: 11px; font-weight: 700; cursor: pointer;
  font-family: var(--mono); padding: 4px 0; flex-shrink: 0;
  text-transform: uppercase; letter-spacing: 0.1em;
}
.wk-nav-center { flex: 1; text-align: center; }
.wk-nav-title  { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
.wk-nav-sub    { font-size: 10px; color: var(--text2); margin-top: 2px; letter-spacing: 0.08em; text-transform: uppercase; }
.wk-nav-spacer { width: 64px; }

/* Segmented progress */
.seg-track {
  display: flex; gap: 2px; padding: 0 20px 12px;
  background: var(--bg);
}
.seg { flex: 1; height: 2px; background: var(--border2); transition: background 0.3s; }
.seg.done   { background: var(--accent); }
.seg.active { background: var(--accent); opacity: 0.35; }

/* Workout body */
.wk-body { flex: 1; padding: 16px 20px 32px; display: flex; flex-direction: column; gap: 8px; }

/* Exercise header */
.ex-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 2px solid var(--accent);
  border-radius: var(--r);
  padding: 14px 16px;
}
.ex-eyebrow {
  font-size: 10px; font-weight: 600; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 6px;
  display: flex; align-items: center; gap: 5px;
}
.ex-name { font-size: 20px; font-weight: 700; letter-spacing: 0.02em; line-height: 1.15; margin-bottom: 10px; text-transform: uppercase; color: var(--text); }
.ex-labels { display: flex; flex-wrap: wrap; gap: 5px; }
.ex-label {
  display: inline-flex; align-items: center; gap: 4px;
  border-radius: 2px; padding: 3px 8px;
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
}
.ex-label-blue   { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(255,69,0,0.2); }
.ex-label-gray   { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }
.ex-label-orange { background: rgba(255,184,0,0.1); color: var(--orange); border: 1px solid rgba(255,184,0,0.2); }

/* Video */
.video-wrap {
  border-radius: var(--r); overflow: hidden;
  background: #000; aspect-ratio: 16/9;
  border: 1px solid var(--border);
}
.video-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

/* Ref card */
.ref-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r); padding: 12px 14px;
  display: flex; align-items: center; gap: 12px;
  text-decoration: none; color: var(--text);
  transition: background 0.12s;
}
.ref-card:active { background: var(--surface2); }
.ref-icon {
  width: 32px; height: 32px; background: var(--accent-dim);
  border: 1px solid rgba(255,69,0,0.2); border-radius: var(--r);
  display: flex; align-items: center; justify-content: center;
  color: var(--accent); flex-shrink: 0;
}
.ref-title { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; }
.ref-sub   { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* Desc */
.desc-card {
  background: var(--surface);
  border: 1px solid var(--border); border-left: 2px solid rgba(255,69,0,0.4);
  border-radius: var(--r); padding: 13px 15px;
  font-size: 13px; line-height: 1.7; color: var(--text2);
}

/* Cues */
.cues-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
}
.cues-header {
  display: flex; align-items: center; gap: 7px; padding: 9px 13px;
  border-bottom: 1px solid var(--border); background: var(--surface2);
  font-size: 10px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.12em;
}
.cue-row {
  display: flex; align-items: flex-start; gap: 10px; padding: 10px 13px;
  border-bottom: 1px solid var(--border);
  font-size: 13px; color: var(--text2); line-height: 1.6;
}
.cue-row:last-child { border-bottom: none; }
.cue-icon { color: var(--green); flex-shrink: 0; margin-top: 1px; }

/* Equipment */
.equip-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
}
.equip-header { display: flex; align-items: center; gap: 7px; padding: 9px 13px; border-bottom: 1px solid var(--border); background: var(--surface2); font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.12em; }
.equip-item { display: flex; align-items: center; gap: 12px; padding: 11px 13px; border-bottom: 1px solid var(--border); font-size: 14px; }
.equip-item:last-child { border-bottom: none; }
.equip-item-icon { width: 28px; height: 28px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r); display: flex; align-items: center; justify-content: center; color: var(--text2); flex-shrink: 0; }
.equip-item-sub { font-size: 10px; color: var(--text3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }

/* Set card */
.set-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden;
}
.set-card-top {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.set-card-label  { font-size: 10px; font-weight: 700; color: var(--text2); display: flex; align-items: center; gap: 5px; text-transform: uppercase; letter-spacing: 0.1em; }
.set-card-detail { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }

.pips { display: flex; gap: 3px; padding: 10px 14px; }
.pip { flex: 1; height: 3px; background: var(--border2); }
.pip.done   { background: var(--accent); }
.pip.active { background: var(--accent); opacity: 0.35; }

.reps-block { text-align: center; padding: 22px 0 24px; border-bottom: 1px solid var(--border); }
.reps-big {
  font-size: 80px; font-weight: 700; letter-spacing: -4px; line-height: 1;
  color: var(--text); font-family: var(--mono);
}
.reps-unit { font-size: 10px; color: var(--text2); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.12em; }

.set-card-actions { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 6px; }

/* Buttons */
.btn-primary {
  width: 100%;
  background: var(--green);
  color: #000; border: none;
  border-radius: var(--r); padding: 15px;
  font-size: 12px; font-weight: 700; cursor: pointer; font-family: var(--mono);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  text-transform: uppercase; letter-spacing: 0.12em;
  transition: opacity 0.12s, transform 0.1s;
}
.btn-primary:active { opacity: 0.85; transform: scale(0.99); }
.btn-primary.finish {
  background: var(--accent);
  color: #fff;
}

.btn-ghost {
  width: 100%; background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text2); border-radius: var(--r); padding: 12px;
  font-size: 11px; font-weight: 600; cursor: pointer; font-family: var(--mono);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  text-transform: uppercase; letter-spacing: 0.08em;
  transition: background 0.12s;
}
.btn-ghost:active { background: var(--surface3); }

/* REST TIMER */
.rest-view {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 32px 22px 28px;
}
.rest-eyebrow {
  font-size: 10px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 28px;
  display: flex; align-items: center; gap: 5px;
}
.rest-ring-wrap { position: relative; width: 200px; height: 200px; margin-bottom: 22px; }
.rest-ring-wrap svg { transform: rotate(-90deg); display: block; }
.ring-bg   { fill: none; stroke: var(--surface3); stroke-width: 6; }
.ring-fill { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: square;
  transition: stroke-dashoffset 1s linear;
}
.ring-fill.urgent { stroke: var(--red); }
.rest-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.rest-sec  { font-size: 60px; font-weight: 700; letter-spacing: -2px; line-height: 1; font-family: var(--mono); }
.rest-unit { font-size: 9px; font-weight: 600; color: var(--text3); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.14em; }

.rest-msg  { font-size: 12px; font-weight: 700; color: var(--text2); text-align: center; line-height: 1.5; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
.rest-next { font-size: 10px; color: var(--text3); margin-bottom: 28px; display: flex; align-items: center; gap: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
.rest-btns { display: flex; flex-direction: column; gap: 6px; width: 100%; }
.rest-skip {
  width: 100%; background: var(--green);
  color: #000; border: none;
  border-radius: var(--r); padding: 15px; font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: var(--mono); display: flex; align-items: center;
  justify-content: center; gap: 8px; text-transform: uppercase; letter-spacing: 0.12em;
  transition: opacity 0.12s;
}
.rest-skip:active { opacity: 0.85; }
.rest-add {
  width: 100%; background: none; border: none; color: var(--text3);
  padding: 10px; font-size: 11px; cursor: pointer; font-family: var(--mono);
  display: flex; align-items: center; justify-content: center; gap: 5px;
  text-transform: uppercase; letter-spacing: 0.08em;
}

/* DONE */
#screen-done { align-items: center; justify-content: center; text-align: center; padding: 48px 24px; }
.done-icon {
  width: 72px; height: 72px; border-radius: var(--r-lg);
  background: var(--green-dim); border: 1px solid rgba(0,230,118,0.2);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 22px; color: var(--green);
}
.done-title { font-size: 22px; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 8px; text-transform: uppercase; }
.done-sub   { font-size: 12px; color: var(--text2); line-height: 1.6; margin-bottom: 28px; }
.done-stats { display: flex; gap: 6px; margin-bottom: 24px; width: 100%; max-width: 320px; }
.done-stat  {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px 10px; text-align: center;
}
.done-stat-n { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; font-family: var(--mono); color: var(--accent); }
.done-stat-l { font-size: 9px; color: var(--text3); margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
.done-home-btn {
  width: 100%; max-width: 320px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--r); color: var(--text2); padding: 14px;
  font-size: 11px; font-weight: 700; cursor: pointer; font-family: var(--mono);
  text-transform: uppercase; letter-spacing: 0.1em;
  transition: background 0.15s;
}
.done-home-btn:active { background: var(--surface2); }

/* Set timer */
.set-timer { padding: 10px 14px 4px; }
.set-timer-bar-wrap { background: var(--surface3); height: 3px; overflow: hidden; }
.set-timer-bar { height: 100%; background: var(--accent); transition: width 1s linear; }
.set-timer-meta { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); margin-top: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
@keyframes pulse-green {
  0%,100% { box-shadow: 0 0 0 0 rgba(0,230,118,0.5); }
  50%     { box-shadow: 0 0 0 8px rgba(0,230,118,0); }
}
.btn-primary.pulse { animation: pulse-green 0.8s ease-in-out infinite; }
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="home-top">
    <div class="home-eyebrow" id="home-eyebrow">Fysio Oefeningen</div>
    <div class="home-title">Fysio Oefeningen</div>
    <div class="home-sub">3-daags herstelschema</div>
    <div class="streak-pill" id="streak-pill"><span id="streak-text"><b>0</b> dagen op rij</span></div>
  </div>
  <div class="home-list">
    <div class="list-label">Trainingen</div>
    <div id="day-cards"></div>
  </div>
  <div class="home-history">
    <div class="list-label" style="padding:0 2px 8px">Recente sessies</div>
    <div id="history-list"></div>
  </div>
</div>

<!-- WORKOUT -->
<div id="screen-workout" class="screen">
  <div class="wk-nav">
    <button class="wk-back" id="wk-back-btn" onclick="goHome()">Terug</button>
    <div class="wk-nav-center">
      <div class="wk-nav-title" id="wk-title">Dag 1</div>
      <div class="wk-nav-sub"   id="wk-sub">Oefening 1 van 6</div>
    </div>
    <div class="wk-nav-spacer"></div>
  </div>
  <div class="seg-track" id="seg-track"></div>
  <div class="wk-body"   id="wk-body"></div>
</div>

<!-- DONE -->
<div id="screen-done" class="screen">
  <div class="done-icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div class="done-title">Goed gedaan</div>
  <p class="done-sub" id="done-p">Je hebt Dag 1 voltooid.</p>
  <div class="done-stats">
    <div class="done-stat"><div class="done-stat-n" id="ds-ex">6</div><div class="done-stat-l">Oefeningen</div></div>
    <div class="done-stat"><div class="done-stat-n" id="ds-sets">18</div><div class="done-stat-l">Sets</div></div>
    <div class="done-stat"><div class="done-stat-n" id="ds-streak">1</div><div class="done-stat-l">Streak</div></div>
  </div>
  <button class="done-home-btn" onclick="goHome()">Terug naar home</button>
</div>

<script>
const PATHS={
  'chevron-right':`<polyline points="9 18 15 12 9 6"/>`,
  'chevron-left': `<polyline points="15 18 9 12 15 6"/>`,
  'arrow-right':  `<line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>`,
  'check':        `<polyline points="20 6 9 17 4 12"/>`,
  'check-circle': `<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>`,
  'clock':        `<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>`,
  'flame':        `<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 3z"/>`,
  'dumbbell':     `<path d="M6 5v14M18 5v14M3 9h6M15 9h6M3 15h6M15 15h6"/>`,
  'link2':        `<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>`,
  'circle':       `<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>`,
  'play':         `<polygon points="5 3 19 12 5 21 5 3"/>`,
  'info':         `<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>`,
  'bag':          `<path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>`,
  'skip':         `<polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>`,
  'plus':         `<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>`,
  'activity':     `<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>`,
};
function ic(n,s=16){ return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${PATHS[n]||''}</svg>`; }

const EQUIP={
  1:[{i:'dumbbell',n:'Kettlebell of dumbbell',s:'12 kg — goblet squat'},{i:'link2',n:'Kabelstation of band',s:'Pallof press & face pull'},{i:'circle',n:'Bekkenbodembal',s:'Vloeroefening'}],
  2:[{i:'dumbbell',n:'Dumbbell',s:'7 kg — liggende press'},{i:'circle',n:'Bekkenbodembal',s:'Vloeroefening'}],
  3:[{i:'dumbbell',n:'Kettlebell of dumbbell',s:'12 kg — goblet squat'},{i:'dumbbell',n:'Lichtere dumbbell',s:'Side bends & liggende press'},{i:'link2',n:'Kabelstation of band',s:'Pallof press & face pull'},{i:'circle',n:'Bekkenbodembal',s:'Vloeroefening'}],
};
const DAY_SUB={1:'Jefferson curl · Goblet squat · Pallof · Face pull · Side bends · Bekkenbodem',2:'Jefferson curl · Split squats · Liggende press · Bruggetjes · Bekkenbodem',3:'Side bends · Goblet squat · Pallof · Face pull · Liggende press · Bekkenbodem'};
const P={
  1:[
    {naam:'Jefferson Curl',sets:3,reps:'6–8',  type:'yt',  vid:'BGQ-1Uptah8',notitie:'',cues:['Rol je wervelkolom op wervel voor wervel — begin bij het hoofd','Houd de knieën licht gebogen gedurende de hele beweging','Houd het gewicht dicht bij je lichaam']},
    {naam:'Goblet Squat',  sets:3,reps:'10–12',type:'yt',  vid:'MxsFDhcyFyE',notitie:'12 kg',cues:['Houd de kettlebell dicht tegen je borst','Knieën wijzen in de richting van je tenen','Hak blijft volledig op de grond tijdens de beweging']},
    {naam:'Pallof Press',  sets:3,reps:'10',   type:'yt',  vid:'_2xWmYNnFS8',notitie:'',cues:['Houd je kern actief en je rug recht','Strek de armen langzaam en gecontroleerd uit','Laat je romp niet mee draaien bij het uitstrekken']},
    {naam:'Face Pull',     sets:3,reps:'12',   type:'yt',  vid:'0GRycI5CXnM',notitie:'',cues:['Trek naar je voorhoofd — ellebogen omhoog','Schouderbladen naar elkaar toe in de eindpositie','Langzame, gecontroleerde beweging terug']},
    {naam:'Side Bends',    sets:3,reps:'10',   type:'yt',  vid:'mjRUPpMh988',notitie:'',cues:['Beweeg recht naar opzij — niet naar voren of achteren','Houd beide heupen op dezelfde hoogte','Voel de rek aan de zijkant van je romp']},
    {naam:'Bekkenbodem',   sets:3,reps:'12',   type:'text',notitie:'Op buik met bal',desc:'Ga op je buik liggen met de bal tussen je enkels. Bekken plat op de grond, voorhoofd op je handen. Adem uit: buig je benen, druk op de bal en til je benen 1 cm op — echt maar een heel klein beetje.',cues:['Houd je bekken plat op de grond tijdens de hele oefening','Adem volledig uit voordat je de benen optilt','De beweging is klein — kwaliteit boven kwantiteit']},
  ],
  2:[
    {naam:'Jefferson Curl',sets:3,reps:'6–8',  type:'yt',  vid:'BGQ-1Uptah8',notitie:'',cues:['Rol je wervelkolom op wervel voor wervel — begin bij het hoofd','Houd de knieën licht gebogen gedurende de hele beweging','Houd het gewicht dicht bij je lichaam']},
    {naam:'Split Squats',  sets:3,reps:'8',    type:'yt',  vid:'SGHnCftrZkA',notitie:'Per kant',cues:['Houd je voorste knie boven je voet — niet te ver naar voren','Romp blijft recht omhoog, niet naar voren leunen','Achterste knie rustig en gecontroleerd naar de grond']},
    {naam:'Liggende Press',sets:3,reps:'8–10', type:'yt',  vid:'NubSSALIqsU',notitie:'7 kg',cues:['Houd je onderrug plat op de onderlaag','Ellebogen licht naar binnen tijdens de beweging','Gecontroleerd zakken, krachtig omhoog duwen']},
    {naam:'Bruggetjes',    sets:3,reps:'12–15',type:'text',notitie:'',desc:'Lig op je rug met gebogen knieën, voeten op de grond. Duw je heupen omhoog tot een rechte lijn van knieën tot schouders. Houd even vast en laat langzaam zakken.',cues:['Duw via je hielen omhoog — niet via je tenen','Span je bilspieren actief aan in de bovenste positie','Houd je bekken horizontaal — niet scheef laten zakken']},
    {naam:'Bekkenbodem',   sets:3,reps:'12',   type:'text',notitie:'Tafelpositie',desc:'Plaats de bal onder je heiligbeen. Breng je benen in tafelpositie. Plak de binnenkant van je voeten tegen elkaar. Adem uit: spreid je knieën zo ver mogelijk uit elkaar terwijl je voeten bij elkaar blijven.',cues:['Houd de bal stabiel onder je heiligbeen','Beweeg rustig en gecontroleerd vanuit je heupen','Adem bewust uit bij het spreiden van de knieën']},
  ],
  3:[
    {naam:'Side Bends',    sets:3,reps:'10',   type:'yt',  vid:'mjRUPpMh988',notitie:'Per kant',cues:['Beweeg recht naar opzij — niet naar voren of achteren','Houd beide heupen op dezelfde hoogte','Voel de rek aan de zijkant van je romp']},
    {naam:'Goblet Squat',  sets:3,reps:'12',   type:'yt',  vid:'MxsFDhcyFyE',notitie:'',cues:['Houd de kettlebell dicht tegen je borst','Knieën wijzen in de richting van je tenen','Hak blijft volledig op de grond tijdens de beweging']},
    {naam:'Pallof Press',  sets:3,reps:'10',   type:'yt',  vid:'_2xWmYNnFS8',notitie:'',cues:['Houd je kern actief en je rug recht','Strek de armen langzaam en gecontroleerd uit','Laat je romp niet mee draaien bij het uitstrekken']},
    {naam:'Face Pull',     sets:3,reps:'10–12',type:'yt',  vid:'0GRycI5CXnM',notitie:'',cues:['Trek naar je voorhoofd — ellebogen omhoog','Schouderbladen naar elkaar toe in de eindpositie','Langzame, gecontroleerde beweging terug']},
    {naam:'Liggende Press',sets:3,reps:'8–10', type:'yt',  vid:'NubSSALIqsU',notitie:'',cues:['Houd je onderrug plat op de onderlaag','Ellebogen licht naar binnen tijdens de beweging','Gecontroleerd zakken, krachtig omhoog duwen']},
    {naam:'Bekkenbodem',   sets:3,reps:'12',   type:'text',notitie:'Zijligging · per kant',desc:'In zijligging: laat het bovenste been langs het andere been glijden en breng het omhoog. Druk tegelijkertijd met een gestrekte arm in de bal. Adem in — laat met een uitademing het been zakken.',cues:['Houd je romp stabiel — niet naar voren of achteren kantelen','Druk bewust en gelijkmatig met je arm in de bal','De beweging komt vanuit je heup, niet je rug']},
  ],
};

const DUR={
  'Jefferson Curl':35,'Goblet Squat':35,'Pallof Press':30,'Face Pull':35,
  'Side Bends':60,'Bekkenbodem':35,'Split Squats':60,'Liggende Press':30,'Bruggetjes':40,
};
function calcDayDuration(d){
  const oefs=P[d],totalSets=oefs.reduce((s,o)=>s+o.sets,0);
  const work=oefs.reduce((s,o)=>s+o.sets*(DUR[o.naam]||30),0);
  return Math.round((work+(totalSets-1)*REST_SECS)/60);
}
let st={day:null,ex:0,set:0,history:[]};
let nextExPending=false,restInterval=null,setTimerInterval=null;
const REST_SECS=45;
const COACH=['Goed gedaan. Even bijkomen.','Sterke set. Haal adem.','Lekker bezig — bijna klaar.','Top! Blijf gefocust.','Geweldig. Nog even.','Knap! Klaar voor de volgende?'];

function load(){ try{const d=localStorage.getItem('fysio-v6');if(d)st.history=JSON.parse(d);}catch(e){} renderHome(); }
function save(){ try{localStorage.setItem('fysio-v6',JSON.stringify(st.history));}catch(e){} }
function today(){ return new Date().toISOString().split('T')[0]; }
function fmtDate(d){ return new Date(d+'T12:00:00').toLocaleDateString('nl-NL',{weekday:'short',day:'numeric',month:'short'}); }
function getStreak(){ const days=new Set(st.history.map(h=>h.datum));let s=0,d=new Date();while(true){const k=d.toISOString().split('T')[0];if(days.has(k)){s++;d.setDate(d.getDate()-1);}else break;}return s; }
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');window.scrollTo(0,0); }

function renderHome(){
  document.getElementById('home-eyebrow').innerHTML=ic('activity',12)+' Fysio Oefeningen';
  const streak=getStreak();
  document.getElementById('streak-pill').innerHTML=ic('flame',13)+` <span><b>${streak}</b> dag${streak!==1?'en':''} op rij</span>`;
  const t=today();
  document.getElementById('day-cards').innerHTML=[1,2,3].map(d=>{
    const done=st.history.some(h=>h.dag===d&&h.datum===t);
    const durTag=`<span class="day-tag">${ic('clock',10)} ~${calcDayDuration(d)} min</span>`;
    const tags=durTag+EQUIP[d].map(e=>`<span class="day-tag">${ic(e.i,10)} ${e.n.includes('Lichtere')?'Lichtere dumbbell':e.n.split(' of ')[0]}</span>`).join('');
    return `<button class="day-card${done?' done':''}" onclick="startDay(${d})">
      <div class="day-badge">${done?ic('check',16):d}</div>
      <div class="day-body">
        <div class="day-title">Dag ${d}</div>
        <div class="day-sub">${DAY_SUB[d]}</div>
        <div class="day-tags">${tags}</div>
      </div>
      <div class="day-chev">${done?ic('check-circle',16):ic('chevron-right',16)}</div>
    </button>`;
  }).join('');

  const recent=[...st.history].reverse().slice(0,7);
  document.getElementById('history-list').innerHTML=recent.length===0
    ?`<div class="hist-empty">Nog geen sessies — start je eerste training</div>`
    :recent.map(h=>`<div class="hist-item"><div class="hist-dot"></div><div class="hist-label">Dag ${h.dag} voltooid</div><div class="hist-date">${fmtDate(h.datum)}</div></div>`).join('');
}

function triggerWatchWorkout(){
  try{ window.location.href='shortcuts://run-shortcut?name=Start%20core%20work-out'; }catch(e){}
}
function startSetTimer(dur){
  clearInterval(setTimerInterval);
  let secs=dur;
  const bar=document.getElementById('set-timer-bar'),label=document.getElementById('set-timer-secs');
  if(!bar)return;
  bar.style.width='100%';
  if(label)label.textContent=secs+'s';
  setTimerInterval=setInterval(()=>{
    secs--;
    const b=document.getElementById('set-timer-bar'),l=document.getElementById('set-timer-secs');
    if(!b){clearInterval(setTimerInterval);return;}
    b.style.width=Math.max(0,secs/dur*100)+'%';
    if(l)l.textContent=secs>0?secs+'s':'Klaar!';
    if(secs<=0){clearInterval(setTimerInterval);playBeep();document.querySelector('#wk-body .btn-primary')?.classList.add('pulse');}
  },1000);
}
function startDay(d){ st.day=d;st.ex=0;st.set=0;triggerWatchWorkout();renderWorkout();show('workout'); }
function goHome(){ clearInterval(restInterval);clearInterval(setTimerInterval);nextExPending=false;st.day=null;renderHome();show('home'); }

function renderWorkout(){
  const oefs=P[st.day],o=oefs[st.ex],n=oefs.length;
  document.getElementById('wk-title').textContent=`Dag ${st.day}`;
  document.getElementById('wk-sub').textContent=`Oefening ${st.ex+1} van ${n}`;
  document.getElementById('wk-back-btn').innerHTML=ic('chevron-left',16)+' Terug';
  document.getElementById('seg-track').innerHTML=Array.from({length:n},(_,i)=>`<div class="seg${i<st.ex?' done':i===st.ex?' active':''}"></div>`).join('');

  const isLastSet=st.set===o.sets-1,isLastEx=st.ex===oefs.length-1;
  const perKant=o.notitie.toLowerCase().includes('kant');
  const pips=Array.from({length:o.sets},(_,i)=>`<div class="pip${i<st.set?' done':i===st.set?' active':''}"></div>`).join('');

  const equipHtml=st.ex===0?`<div class="equip-card">
    <div class="equip-header">${ic('bag',13)} Benodigdheden</div>
    ${EQUIP[st.day].map(e=>`<div class="equip-item"><div class="equip-item-icon">${ic(e.i,13)}</div><div><div>${e.n}</div><div class="equip-item-sub">${e.s}</div></div></div>`).join('')}
  </div>`:'';

  let media='';
  if(o.type==='yt') media=`<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${o.vid}?rel=0&modestbranding=1" allow="accelerometer;autoplay;encrypted-media" allowfullscreen></iframe></div>`;
  else if(o.type==='link') media=`<a href="${o.url}" target="_blank" class="ref-card"><div class="ref-icon">${ic('play',13)}</div><div><div class="ref-title">Bekijk uitleg</div><div class="ref-sub">fysiofabriek.nl — opent in nieuwe tab</div></div></a>`;
  if(o.desc) media+=`<div class="desc-card">${o.desc}</div>`;

  const cuesHtml=o.cues?`<div class="cues-card">
    <div class="cues-header">${ic('info',13)} Aandachtspunten</div>
    ${o.cues.map(c=>`<div class="cue-row"><div class="cue-icon">${ic('check',13)}</div><div>${c}</div></div>`).join('')}
  </div>`:'';

  const btnLabel=isLastSet?(isLastEx?'Training afronden':'Volgende oefening'):`Set ${st.set+1} gedaan`;
  const exLabels=[
    o.notitie?`<span class="ex-label ex-label-blue">${ic('info',10)} ${o.notitie}</span>`:'',
    `<span class="ex-label ex-label-gray">${o.sets}×${o.reps}</span>`,
    perKant?`<span class="ex-label ex-label-orange">per kant</span>`:'',
  ].filter(Boolean).join('');

  document.getElementById('wk-body').innerHTML=`
    ${equipHtml}
    <div class="ex-card">
      <div class="ex-eyebrow">${ic('activity',11)} Oefening ${st.ex+1} van ${oefs.length}</div>
      <div class="ex-name">${o.naam}</div>
      <div class="ex-labels">${exLabels}</div>
    </div>
    ${media}
    ${cuesHtml}
    <div class="set-card">
      <div class="set-card-top">
        <span class="set-card-label">${ic('activity',12)} Set ${st.set+1} van ${o.sets}</span>
        <span class="set-card-detail">${o.reps} herh.${perKant?' per kant':''}</span>
      </div>
      <div class="pips">${pips}</div>
      <div class="reps-block">
        <div class="reps-big">${o.reps}</div>
        <div class="reps-unit">herhalingen${perKant?' per kant':''}</div>
      </div>
      <div class="set-timer" id="set-timer">
        <div class="set-timer-bar-wrap"><div class="set-timer-bar" id="set-timer-bar" style="width:100%"></div></div>
        <div class="set-timer-meta"><span id="set-timer-secs">${DUR[o.naam]||30}s</span><span>~${DUR[o.naam]||30}s</span></div>
      </div>
      <div class="set-card-actions">
        <button class="btn-primary${isLastSet&&isLastEx?' finish':''}" onclick="completeSet()">
          ${ic('check',15)} ${btnLabel}
        </button>
        <button class="btn-ghost" onclick="skipEx()">
          ${ic('skip',13)} Oefening overslaan
        </button>
      </div>
    </div>`;
  startSetTimer(DUR[o.naam]||30);
}

function completeSet(){
  clearInterval(setTimerInterval);
  const o=P[st.day][st.ex];
  if(st.set<o.sets-1){st.set++;showRest('set');}
  else if(st.ex<P[st.day].length-1){nextExPending=true;showRest('exercise');}
  else finish();
}
function skipEx(){ clearInterval(setTimerInterval);nextExPending=false;clearInterval(restInterval);st.ex++;st.set=0;renderWorkout();window.scrollTo(0,0); }

function showRest(type){
  clearInterval(setTimerInterval);
  clearInterval(restInterval);
  let secs=REST_SECS;
  const circ=2*Math.PI*90;
  const msg=COACH[Math.floor(Math.random()*COACH.length)];
  const nextName=type==='exercise'&&st.ex+1<P[st.day].length?P[st.day][st.ex+1].naam:null;

  function draw(s){
    const offset=circ*(1-s/REST_SECS),urgent=s<=10;
    document.getElementById('wk-body').innerHTML=`
      <div class="rest-view">
        <div class="rest-eyebrow">${ic('clock',12)} Rust</div>
        <div class="rest-ring-wrap">
          <svg viewBox="0 0 200 200" width="200" height="200">
            <circle class="ring-bg"   cx="100" cy="100" r="90"/>
            <circle class="ring-fill${urgent?' urgent':''}" cx="100" cy="100" r="90"
              stroke-dasharray="${circ}" stroke-dashoffset="${offset}" id="rest-ring"/>
          </svg>
          <div class="rest-center">
            <div class="rest-sec" id="rest-num">${s}</div>
            <div class="rest-unit">sec</div>
          </div>
        </div>
        <div class="rest-msg">${msg}</div>
        ${nextName?`<div class="rest-next">${ic('arrow-right',12)} Volgende: ${nextName}</div>`:'<div style="height:22px"></div>'}
        <div class="rest-btns">
          <button class="rest-skip" onclick="skipRest()">${ic('check',15)} Ik ben klaar</button>
          <button class="rest-add"  onclick="addRest()">${ic('plus',12)} 15 seconden extra rust</button>
        </div>
      </div>`;
  }
  draw(secs);
  restInterval=setInterval(()=>{
    secs--;
    const n=document.getElementById('rest-num'),r=document.getElementById('rest-ring');
    if(!n){clearInterval(restInterval);return;}
    n.textContent=secs;r.style.strokeDashoffset=circ*(1-secs/REST_SECS);
    if(secs<=10)r.classList.add('urgent');
    if(secs<=0){clearInterval(restInterval);playBeep();skipRest();}
  },1000);
}

function skipRest(){ clearInterval(restInterval);if(nextExPending){nextExPending=false;st.ex++;st.set=0;}renderWorkout();window.scrollTo(0,0); }
function addRest(){
  const n=document.getElementById('rest-num');if(!n)return;
  let secs=parseInt(n.textContent)+15;clearInterval(restInterval);
  const circ=2*Math.PI*90;
  const tick=()=>{const n=document.getElementById('rest-num'),r=document.getElementById('rest-ring');if(!n){clearInterval(restInterval);return;}n.textContent=secs;r.style.strokeDashoffset=circ*(1-secs/REST_SECS);if(secs<=10)r.classList.add('urgent');if(secs<=0){clearInterval(restInterval);playBeep();skipRest();}secs--;};
  tick();restInterval=setInterval(tick,1000);
}
function playBeep(){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[0,.15,.3].forEach(t=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;o.type='sine';g.gain.setValueAtTime(.25,ctx.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.12);o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.15);});}catch(e){}
}
function finish(){
  const d=st.day,oefs=P[d];
  st.history.push({dag:d,datum:today()});save();
  document.getElementById('ds-ex').textContent=oefs.length;
  document.getElementById('ds-sets').textContent=oefs.reduce((s,o)=>s+o.sets,0);
  document.getElementById('ds-streak').textContent=getStreak();
  document.getElementById('done-p').textContent=`Je hebt Dag ${d} voltooid. Goed bezig!`;
  st.day=null;show('done');
}

load();
</script>
</body>
